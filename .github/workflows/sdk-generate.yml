name: SDK Generate
on:
  workflow_dispatch:

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - lang: python
            repo: humetric-sdk-python
          - lang: typescript
            repo: humetric-sdk-js
          - lang: dotnet
            repo: humetric-sdk-dotnet
          - lang: php
            repo: humetric-sdk-php
          - lang: java
            repo: humetric-sdk-java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Generate OpenAPI spec
        run: |
          pip install -e ".[dev]"
          python generate_openapi.py
          cp openapi.json /tmp/openapi.json
        env:
          ANTHROPIC_API_KEY: sk-test
          VOYAGE_API_KEY: pa-test
          HUMETRIC_AUTH_SECRET: test-secret
      - name: Generate SDK
        uses: openapitools/openapi-generator-cli-action@v1
        with:
          generator: ${{ matrix.lang }}
          input: /tmp/openapi.json
          output: /tmp/humetric-sdk-${{ matrix.lang }}
          config: openapi-generator-config/${{ matrix.lang }}.yaml
      - name: Push to SDK repo
        run: |
          git clone https://x-access-token:${{ secrets.SDK_REPO_TOKEN }}@github.com/bestekarx/${{ matrix.repo }}.git /tmp/sdk-target
          cp -r /tmp/humetric-sdk-${{ matrix.lang }}/* /tmp/sdk-target/
          cd /tmp/sdk-target
          git config user.name "bestekarx"
          git config user.email "bestekarx@users.noreply.github.com"
          git add .
          git diff --staged --quiet || (git commit -m "auto: regenerate from OpenAPI spec" && git push)
