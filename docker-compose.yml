services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: humetric
      POSTGRES_PASSWORD: humetric
      POSTGRES_DB: humetric
    ports:
      - "5434:5432"
    volumes:
      - humetric_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humetric -d humetric"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: .
    command: python -m humetric.worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped

volumes:
  humetric_pgdata:
