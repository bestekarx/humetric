services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-humetric}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-humetric}
      POSTGRES_DB: ${POSTGRES_DB:-humetric}
    volumes:
      - humetric_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-humetric} -d ${POSTGRES_DB:-humetric}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: >
      sh -c "python -m alembic upgrade head && echo 'Migrations done'"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-humetric}:${POSTGRES_PASSWORD:-humetric}@db:5432/${POSTGRES_DB:-humetric}
      DATABASE_URL_APP: postgresql+psycopg://${POSTGRES_USER:-humetric}:${POSTGRES_PASSWORD:-humetric}@db:5432/${POSTGRES_DB:-humetric}
      # Fresh installs create the humetric_app role with this password
      # (migration 001). On an EXISTING database the role already exists —
      # rotate its password to the same value with (plain postgresql:// URL,
      # not the SQLAlchemy postgresql+psycopg:// form):
      #   psql "postgresql://<admin>:<pass>@<host>:5432/humetric" -f scripts/create_app_role.sql
      # Password must be [A-Za-z0-9_-] only — migration 001 rejects anything
      # else, and it is embedded in DATABASE_URL_APP without URL-encoding.
      HUMETRIC_APP_DB_PASSWORD: ${APP_DB_PASSWORD:?Set APP_DB_PASSWORD (humetric_app role password) in Dokploy env}
      HUMETRIC_AUTH_SECRET: ${HUMETRIC_AUTH_SECRET}
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-humetric}:${POSTGRES_PASSWORD:-humetric}@db:5432/${POSTGRES_DB:-humetric}
      # Runtime queries go through the restricted humetric_app role so
      # Postgres RLS is actually enforced (the owner role bypasses it).
      DATABASE_URL_APP: postgresql+psycopg://${APP_DB_USER:-humetric_app}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD (humetric_app role password) in Dokploy env}@db:5432/${POSTGRES_DB:-humetric}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      HUMETRIC_AUTH_SECRET: ${HUMETRIC_AUTH_SECRET}
      HUMETRIC_ENCRYPTION_KEY: ${HUMETRIC_ENCRYPTION_KEY:-}
      HUMETRIC_REQUIRE_EMAIL_VERIFICATION: "false"
      HUMETRIC_BASE_URL: https://api.gethumetric.com
      HUMETRIC_ENFORCE_TIER_LIMITS: "true"
      HUMETRIC_FREE_TIER_SIGNAL_LIMIT: ${HUMETRIC_FREE_TIER_SIGNAL_LIMIT:-1000}
      HUMETRIC_FREE_TIER_ENTITY_LIMIT: ${HUMETRIC_FREE_TIER_ENTITY_LIMIT:-10}
      HUMETRIC_FREE_TIER_PACK_LIMIT: ${HUMETRIC_FREE_TIER_PACK_LIMIT:-1}
      HUMETRIC_CORS_ALLOWED_ORIGINS: ${HUMETRIC_CORS_ALLOWED_ORIGINS:-https://gethumetric.com,https://www.gethumetric.com}
      # Transactional email via Amazon SES (SMTP interface).
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-hello@gethumetric.com}
    restart: unless-stopped
    networks:
      - default
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.humetric-api.rule=Host(`api.gethumetric.com`)"
      - "traefik.http.routers.humetric-api.entrypoints=websecure"
      - "traefik.http.routers.humetric-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.humetric-api.loadbalancer.server.port=8002"

  # Real-time worker: signal pipeline + re-embed + nightly export.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: python -m humetric.worker
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      # Task claiming scans the queue cross-tenant, so the worker keeps the
      # owner connection for DATABASE_URL (see worker.py main()); per-task
      # tenant isolation is applied via the GUC + explicit tenant filters.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-humetric}:${POSTGRES_PASSWORD:-humetric}@db:5432/${POSTGRES_DB:-humetric}
      DATABASE_URL_APP: postgresql+psycopg://${APP_DB_USER:-humetric_app}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD (humetric_app role password) in Dokploy env}@db:5432/${POSTGRES_DB:-humetric}
      HUMETRIC_WORKER_TASK_TYPES: signal_process,re_embed,lakehouse_export
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      HUMETRIC_AUTH_SECRET: ${HUMETRIC_AUTH_SECRET}
      HUMETRIC_ENCRYPTION_KEY: ${HUMETRIC_ENCRYPTION_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys,time; p='/tmp/humetric_worker_heartbeat'; sys.exit(0 if os.path.exists(p) and time.time()-os.path.getmtime(p)<300 else 1)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # One-shot backfill job — drains the signal_process queue via the Anthropic
  # Message Batches API (50% cost) and exits. Not started by default; run on
  # demand:
  #   docker compose -f docker-compose.dokploy.yml --profile backfill run --rm batch-backfill
  batch-backfill:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: python -m humetric.batch_worker
    profiles: ["backfill"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-humetric}:${POSTGRES_PASSWORD:-humetric}@db:5432/${POSTGRES_DB:-humetric}
      DATABASE_URL_APP: postgresql+psycopg://${APP_DB_USER:-humetric_app}:${APP_DB_PASSWORD:?Set APP_DB_PASSWORD (humetric_app role password) in Dokploy env}@db:5432/${POSTGRES_DB:-humetric}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      VOYAGE_API_KEY: ${VOYAGE_API_KEY}
      HUMETRIC_AUTH_SECRET: ${HUMETRIC_AUTH_SECRET}
      HUMETRIC_ENCRYPTION_KEY: ${HUMETRIC_ENCRYPTION_KEY:-}
      HUMETRIC_BATCH_SUBMIT_SIZE: ${HUMETRIC_BATCH_SUBMIT_SIZE:-1000}
      HUMETRIC_CURATOR_FAST_PATH_ENABLED: ${HUMETRIC_CURATOR_FAST_PATH_ENABLED:-true}
    restart: "no"

volumes:
  humetric_pgdata:

# Dokploy's Traefik only routes to services attached to this external network
# (its docker provider ignores containers outside it). The api service joins
# both `default` (to reach db/worker) and `dokploy-network` (for ingress).
networks:
  dokploy-network:
    external: true
