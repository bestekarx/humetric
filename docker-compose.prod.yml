services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: humetric
      POSTGRES_PASSWORD: humetric
      POSTGRES_DB: humetric
    ports:
      - "5434:5432"
    volumes:
      - humetric_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U humetric -d humetric"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0

  api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    ports:
      - "8002:8002"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 1024m
    cpus: 2.0

  worker:
    build:
      context: .
      dockerfile: Dockerfile.prod
    command: python -m humetric.worker
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    restart: unless-stopped
    mem_limit: 512m
    cpus: 1.0
    deploy:
      replicas: 2

volumes:
  humetric_pgdata:
